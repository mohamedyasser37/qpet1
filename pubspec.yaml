name: vet
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0
  share_plus: ^10.1.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.3
  firebase_auth: ^5.4.1
  image_picker: ^1.1.2
  supabase: ^2.3.4
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
